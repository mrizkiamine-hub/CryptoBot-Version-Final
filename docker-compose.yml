services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dst_db
      POSTGRES_USER: daniel
      POSTGRES_PASSWORD: datascientest
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daniel -d dst_db"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build: .
    env_file:
      - .env.step4
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  mongodb:
    image: mongo:7.0
    container_name: my_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4_container
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  mongodata:

  